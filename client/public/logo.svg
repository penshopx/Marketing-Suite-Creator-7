<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Bar chart bars (marketing growth) -->
  <rect x="80" y="280" width="72" height="152" rx="12" fill="white" opacity="0.9"/>
  <rect x="184" y="200" width="72" height="232" rx="12" fill="white" opacity="0.9"/>
  <rect x="288" y="140" width="72" height="292" rx="12" fill="white" opacity="0.9"/>

  <!-- Upward trend arrow/line -->
  <polyline points="100,295 204,218 308,155 390,108" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Sparkle star (AI) top right -->
  <g transform="translate(390, 90)" opacity="1">
    <!-- Star shape -->
    <polygon points="0,-32 8,-8 32,0 8,8 0,32 -8,8 -32,0 -8,-8" fill="white"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="#7c3aed"/>
  </g>
</svg>
